<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expedientes | IUSSEMPER PERICIAL</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <script src="https://kit.fontawesome.com/d90850e71e.js" crossorigin="anonymous"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../CSS/files.css">
    <link rel="stylesheet" href="../CSS/dashboard.css">
</head>
<body>

    <!-- SIDEBAR  -->
    <aside class="sidebar">
        <div class="brand-section">
            <div class="logo-box">
                <i class="fas fa-scale-balanced"></i>
            </div>
            <div>
                <h2>IUSSEMPER</h2>
                <span>PERICIAL</span>
            </div>
        </div>

        <div class="online-user">
            <div class="status-dot"></div>
            <div>
                <p class="mb-0 fw-semibold">Usuario en línea</p>
                <small id="user-name"></small>
            </div>
        </div>

        <nav class="menu-options">
            <a href="../PAGES/DASHBOARD.html" class="menu-card">
                <i class="fas fa-chart-line"></i>
                <span>Panel Principal</span>
            </a>
            <a href="#" class="menu-card">
                <i class="fas fa-list-check"></i>
                <span>Pendientes</span>
            </a>
            <a href="#" class="menu-card">
                <i class="fas fa-calendar-days"></i>
                <span>Calendario</span>
            </a>
            <a href="../PAGES/FILES.html" class="menu-card active">
                <i class="fas fa-folder-open"></i>
                <span>Expedientes</span>
            </a>
            <a href="#" class="menu-card">
                <i class="fas fa-address-book"></i>
                <span>Contactos</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="footer-btn support">
                <i class="fa-regular fa-headphones"></i>
                <span>Soporte Técnico</span>
            </button>
            <button class="footer-btn logout">
                <i class="fa-solid fa-door-open"></i>
                <span>Cerrar Sesión</span>
            </button>
        </div>
    </aside>

    <!-- PRINCIPAL CONTENT -->
    <main class="main-content">
        <!-- TOPBAR -->
        <div class="topbar">
            <div>
                <h1>Expedientes</h1>
                <p>Gestión completa de expedientes</p>
            </div>
            <div class="datetime-box">
                <i class="fas fa-clock"></i>
                <span id="datetime"></span>
            </div>
        </div>

        <!-- HEADER -->
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div>
                    
                </div>
                <button class="btn-add-exp"  onclick="window.location.href='../PAGES/FILE-FORM.html'">
                    <i class="fas fa-plus-circle"></i>
                    <span>Nuevo Expediente</span>
                </button>
            </div>
        </div>

        <!-- FILTER -->
        <div class="filters-section mb-4">
            <div class="row g-3">
                <!-- Search by File Number -->
                <div class="col-md-6 col-lg-4">
                    <div class="search-box">
                        <i class="fas fa-hashtag"></i>
                        <input type="text" id="searchNumero" class="form-control form-control-custom" placeholder="N° de expediente...">
                    </div>
                </div>
                
                <!-- Search by Name -->
                <div class="col-md-6 col-lg-4">
                    <div class="search-box">
                        <i class="fas fa-user"></i>
                        <input type="text" id="searchNombre" class="form-control form-control-custom" placeholder="Nombre (Actor o Demandado)">
                    </div>
                </div>
                
                <!-- Search by Client -->
                <div class="col-md-6 col-lg-4">
                    <div class="search-box">
                        <i class="fas fa-briefcase"></i>
                        <input type="text" id="filterTipoCliente" class="form-control form-control-custom" placeholder="Tipo de cliente">
                    </div>
                </div>
                
                <!-- Filter by Court -->
                <div class="col-md-6 col-lg-3">
                    <div class="search-box">
                        <i class="fas fa-gavel"></i>
                        <input type="text" id="filterJuzgado" class="form-control form-control-custom" placeholder="Juzgado">
                    </div>
                </div>
                
                <!-- Search by Status -->
                <div class="col-md-6 col-lg-3">
                    <select id="filterEstatus" class="form-select form-control-custom">
                        <option value="">Estatus</option>
                        <option value="activo">Activo</option>
                        <option value="en_proceso">En Proceso</option>
                        <option value="suspendido">Suspendido</option>
                        <option value="concluido">Concluido</option>
                        <option value="archivado">Archivado</option>
                    </select>
                </div>
                
                <!-- Clean filters -->
                <div class="col-md-6 col-lg-2">
                    <button id="clearFiltersBtn" class="btn-clear-filters">
                        <i class="fas fa-eraser"></i>
                        Limpiar filtros
                    </button>
                </div>
            </div>
        </div>

        <!-- FILE CARDS GRID -->
        <div class="expedientes-grid" id="expedientesGrid">
            <div class="row g-4" id="expedientesContainer">
                <!-- DYNAMIC -->
            </div>
        </div>

        <!-- No results -->
        <div id="noResultsMessage" class="text-center py-5 d-none">
            <i class="fas fa-folder-open fa-3x" style="color: var(--purple-mist);"></i>
            <p class="mt-3 text-muted">No se encontraron expedientes</p>
        </div>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/filesJS.js"></script>
    <script src="../JS/time&dateJS.js"></script>
</body>
</html>
